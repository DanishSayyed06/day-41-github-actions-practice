name: Manual Environment Trigger

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  print-input:
    runs-on: ubuntu-latest
    steps:
      - name: Print environment
        run: |
          echo "The selected environment is: ${{ github.event.inputs.environment }}"
